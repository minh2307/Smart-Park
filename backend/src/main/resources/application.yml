spring:
  application:
    name: smartpark-backend

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ticketing_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX
    time-zone: Asia/Ho_Chi_Minh
    default-property-inclusion: non_null

  scheduling:
    enabled: true

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always

# JWT Configuration
app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173"
  jwt:
    secret: ${JWT_SECRET:GateOS-Super-Secret-Key-2026-Min64Chars-ForHS512-Algorithm-Security!!}
    access-token-expiration: 900000       # 15 phút (ms)
    refresh-token-expiration: 604800000   # 7 ngày (ms)

  # PayOS Configuration
  integration:
    payos:
      enabled: true
      client-id: ${PAYOS_CLIENT_ID:dummy-client-id}
      api-key: ${PAYOS_API_KEY:dummy-api-key}
      checksum-key: ${PAYOS_CHECKSUM_KEY:dummy-checksum-key}
      return-url: ${PAYOS_RETURN_URL:http://localhost:8080/api/v1/integration/payment/payos/return}
      cancel-url: ${PAYOS_CANCEL_URL:http://localhost:8080/api/v1/integration/payment/payos/cancel}
      webhook-url: ${PAYOS_WEBHOOK_URL:http://localhost:8080/api/v1/integration/payment/payos/webhook}

  # Redis key TTL
  redis:
    ticket-ttl-seconds: 2592000   # 30 ngày
    cooldown-ttl-seconds: 10      # Chống quét QR trùng

  # Order auto-timeout
  order:
    timeout-minutes: 15

  # FastAPI AI Microservice
  ai:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
    timeout-seconds: 5

  # Google BigQuery (BI Data Warehouse)
  bigquery:
    enabled: ${BIGQUERY_ENABLED:false}
    project-id: ${GCP_PROJECT_ID}
    dataset-id: ${BIGQUERY_DATASET}

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: Smart Park API
    description: Smart Amusement Park Management & Business Intelligence Platform REST API
    version: 2.0.0

logging:
  level:
    com.smartpark: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
