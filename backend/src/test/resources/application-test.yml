spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Mock Redis logic since we don't want to rely on real redis in unit tests
  data:
    redis:
      host: localhost
      port: 6379

app:
  cors:
    allowed-origins: http://localhost:3000
  jwt:
    secret: Test-Secret-Key-Test-Secret-Key-Test-Secret-Key-Test-Secret-Key
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

  integration:
    payos:
      enabled: true
      client-id: dummy-client-id
      api-key: dummy-api-key
      checksum-key: dummy-checksum-key
      return-url: http://localhost:8080/api/v1/integration/payment/payos/return
      cancel-url: http://localhost:8080/api/v1/integration/payment/payos/cancel
      webhook-url: http://localhost:8080/api/v1/integration/payment/payos/webhook

  ai:
    base-url: http://localhost:8000
    timeout-seconds: 5

  rate-limit:
    capacity: 10

  bigquery:
    enabled: false
    project-id: test-project
    dataset-id: test-dataset

