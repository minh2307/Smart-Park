spring:
  application:
    name: gateos-backend

  datasource:
    url: jdbc:mysql://localhost:3307/ticketing_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: 123456789
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX
    time-zone: Asia/Ho_Chi_Minh
    default-property-inclusion: non_null

  scheduling:
    enabled: true

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:GateOS-Super-Secret-Key-2026-Min64Chars-ForHS512-Algorithm-Security!!}
    access-token-expiration: 900000       # 15 phút (ms)
    refresh-token-expiration: 604800000   # 7 ngày (ms)

  # VNPay Configuration (Sandbox)
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:DEMO1234}
    hash-secret: ${VNPAY_HASH_SECRET:DEMO_SECRET_KEY_VNPAY}
    pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay-return}
    ipn-url: ${VNPAY_IPN_URL:http://localhost:8080/api/v1/payments/vnpay-ipn}
    api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction

  # Redis key TTL
  redis:
    ticket-ttl-seconds: 2592000   # 30 ngày
    cooldown-ttl-seconds: 10      # Chống quét QR trùng

  # Order auto-timeout
  order:
    timeout-minutes: 15

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: GateOS API
    description: Ticketing & Access Control System REST API
    version: 1.0.0

logging:
  level:
    com.gateos: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
